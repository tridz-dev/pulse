<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/pulse/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="AI-powered SOP execution tracking" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pulse" />
    <link rel="manifest" href="/assets/pulse/manifest.json" />
    <link rel="apple-touch-icon" href="/assets/pulse/icon-192.png" />
    <title>Pulse</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.csrf_token = "{{ csrf_token }}";
      if (!window.frappe) window.frappe = {};
      window.app_name = "{{ app_name }}";
      frappe.boot = JSON.parse({{ boot }});
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
